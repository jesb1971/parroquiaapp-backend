<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login administrador</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height:100vh;">

    <div class="card p-4 shadow" style="width: 300px;">
        <h4 class="text-center mb-3">🔐 Acceso administrador</h4>

        <input type="text" id="user" class="form-control mb-2" placeholder="Usuario">
        <input type="password" id="pass" class="form-control mb-3" placeholder="Contraseña">

        <button class="btn btn-primary w-100" onclick="login()">Entrar</button>

        <p id="error" class="text-danger mt-2 text-center" style="display:none;">
            Credenciales incorrectas
        </p>
    </div>

<script>
function login() {
    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    if (user === "admin" && pass === "1234") {
        localStorage.setItem("admin", "1");
        window.location.href = "/app";
    } else {
        document.getElementById("error").style.display = "block";
    }
}
</script>

</body>
</html>
