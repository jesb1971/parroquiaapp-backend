<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avisos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

<h2 class="mb-4 text-center">📢 Avisos de la Parroquia</h2>

<div id="listaAvisos"></div>

<div class="mt-4 text-center">
    <a href="/app" class="btn btn-secondary">← Volver</a>
</div>

</div>

<script>
async function cargarAvisos() {
    const res = await fetch("/avisos/");
    const data = await res.json();

    const contenedor = document.getElementById("listaAvisos");
    contenedor.innerHTML = "";

    data.forEach(aviso => {
        const div = document.createElement("div");
        div.className = "card mb-2";

        div.innerHTML = `
            <div class="card-body">
                <strong>${aviso.titulo}</strong><br>
                ${aviso.cuerpo}<br>
                <small>${new Date(aviso.publicado_at).toLocaleString()}</small>
            </div>
        `;

        contenedor.appendChild(div);
    });
}

cargarAvisos();
</script>

</body>
</html>
