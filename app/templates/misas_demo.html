<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios de misas</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        .morado { border-left: 6px solid purple; }
        .verde { border-left: 6px solid green; }
        .blanco { border-left: 6px solid #ddd; }
        .rojo { border-left: 6px solid red; }
        .rosa { border-left: 6px solid pink; }
    </style>
</head>

<body class="bg-light">

<div class="container py-5">

    <h1 class="text-center text-primary mb-4">
        Horarios de misas –
    </h1>

    <div class="text-end mb-3">
        <button class="btn btn-sm btn-outline-secondary" onclick="logout()">Cerrar sesión</button>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">

        {% for misa in misas %}
        <div class="col">

            <div class="card shadow-sm h-100 {{ misa.color }}">

                <div class="card-body">

                    <!-- FECHA -->
                    <h5 class="text-primary">
                        📅 {{ misa.fecha.strftime("%d/%m/%Y") }}
                    </h5>

                    <!-- HORA -->
                    <p>⏰ {{ misa.fecha.strftime("%H:%M") }}</p>

                    <!-- TIEMPO LITÚRGICO -->
                    <p class="text-muted">
                        ✝ {{ misa.tiempo }}
                    </p>

                    <!-- DESCRIPCIÓN / CELEBRACIÓN -->
                    <p class="fw-bold">
                        {{ misa.descripcion }}
                    </p>

                </div>

            </div>

        </div>
        {% endfor %}

    </div>
</div>

<script>
function logout() {
    localStorage.removeItem("admin");
    window.location.href = "/login";
}
</script>

</body>
</html>
