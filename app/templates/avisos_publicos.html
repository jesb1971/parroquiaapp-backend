<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avisos</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800">

<div class="max-w-2xl mx-auto py-6 px-4">

    <!-- CABECERA -->
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-blue-700">📢 Avisos</h2>
        <a href="/app" class="text-sm text-gray-500 hover:underline">← Volver</a>
    </div>

    <!-- LISTA -->
    <div id="listaAvisos" class="space-y-3"></div>

</div>

<script>
async function cargarAvisos() {
    try {
        const res = await fetch("/avisos/");
        const data = await res.json();

        const contenedor = document.getElementById("listaAvisos");
        contenedor.innerHTML = "";

        if (data.length === 0) {
            contenedor.innerHTML = "<p class='text-gray-400'>No hay avisos disponibles</p>";
            return;
        }

        data.forEach(aviso => {
            const div = document.createElement("div");
            div.className = "bg-white p-4 rounded-lg shadow-sm";

            div.innerHTML = `
                <h3 class="font-semibold text-lg text-blue-700">${aviso.titulo}</h3>
                <p class="text-gray-600 mt-1">${aviso.cuerpo}</p>
                <p class="text-xs text-gray-400 mt-2">
                    ${new Date(aviso.publicado_at).toLocaleString()}
                </p>
            `;

            contenedor.appendChild(div);
        });

    } catch (error) {
        console.error("Error cargando avisos");
    }
}

cargarAvisos();
</script>

</body>
</html>
