<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horarios de misas</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<<style>
.morado {
    border-left: 10px solid purple;
    background-color: rgba(128, 0, 128, 0.08);
}

.verde {
    border-left: 10px solid green;
    background-color: rgba(0, 128, 0, 0.08);
}

.blanco {
    border-left: 10px solid #ccc;
    background-color: #fafafa;
}

.rojo {
    border-left: 10px solid red;
    background-color: rgba(255, 0, 0, 0.08);
}

.rosa {
    border-left: 10px solid pink;
    background-color: rgba(255, 192, 203, 0.2);
}
</style>
</head>

<body class="bg-light">

<div class="container py-5">

<h1 class="text-center text-primary mb-4">
Horarios de misas –
</h1>

<div class="text-end mb-3">
<button class="btn btn-sm btn-outline-secondary" onclick="logout()">Cerrar sesión</button>
</div>

<div class="row row-cols-1 row-cols-md-3 g-4">

{% for misa in misas %}
<div class="col">

<div class="card shadow-sm h-100 {{ misa.color }}">

<div class="card-body">

<!-- FECHA -->
<h5 class="text-primary">
📅 {{ misa.fecha.strftime("%d/%m/%Y") }}
</h5>

<!-- HORA -->
<p>⏰ {{ misa.fecha.strftime("%H:%M") }}</p>

<!-- TIEMPO -->
<p class="text-muted small">
✝ {{ misa.tiempo }}
</p>

<!-- MODO USUARIO -->
<p id="texto-{{ misa.id }}" class="fw-bold">
{{ misa.descripcion }}
</p>

<!-- MODO ADMIN -->
<div id="admin-{{ misa.id }}" style="display:none;">

<input type="text"
id="desc-{{ misa.id }}"
class="form-control form-control-sm mb-2"
value="{{ misa.descripcion }}">

<button class="btn btn-sm btn-primary w-100"
onclick="guardarMisa({{ misa.id }})">
💾 Guardar cambios
</button>

</div>

</div>
</div>

</div>
{% endfor %}

</div>
</div>

<script>

// ADMIN
function esAdmin() {
return localStorage.getItem("admin") === "1";
}

function aplicarModo() {

if (!esAdmin()) return;

document.querySelectorAll("[id^='admin-']")
.forEach(el => el.style.display = "block");

document.querySelectorAll("[id^='texto-']")
.forEach(el => el.style.display = "none");
}

// GUARDAR
function guardarMisa(id) {

const desc = document.getElementById(`desc-${id}`).value;

fetch(`/misas/${id}`, {
method: "PATCH",
headers: {
"Content-Type": "application/json",
"x-admin": "1234"
},
body: JSON.stringify({
descripcion: desc
})
})
.then(res => {
if (res.ok) {
alert("Guardado correctamente");
location.reload();
} else {
alert("Error al guardar");
}
});
}

// LOGOUT
function logout() {
localStorage.removeItem("admin");
window.location.href = "/login";
}

window.onload = aplicarModo;

</script>

</body>
</html>
